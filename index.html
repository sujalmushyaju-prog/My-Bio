<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #111827;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .header h1 {
            margin: 10px 0 5px 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h2 {
            color: #111827;
        }

        .skills span {
            display: inline-block;
            background: #111827;
            color: white;
            padding: 8px 14px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .project-box {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .project-box:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            color: white;
            background: #2563eb;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
        }

        a:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="mero.jpg" alt="Profile">
        <h1>Your Name</h1>
        <p>Python & Web Developer (Beginner)</p>
    </div>

    <div class="container">

        <div class="card">
            <h2>About Me</h2>
            <p>I am learning programming and building real projects step by step.</p>
        </div>

        <div class="card">
            <h2>Skills</h2>
            <div class="skills">
                <span>Python</span>
                <span>HTML</span>
                <span>CSS</span>
            </div>
        </div>

        <div class="card">
            <h2>Projects</h2>
            <div class="projects">
                <div class="project-box">
                    <h3>Notes App</h3>
                    <p>Simple Python file-based notes system.</p>
                </div>

                <div class="project-box">
                    <h3>File Organizer</h3>
                    <p>Automatically sorts files into folders.</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Contact</h2>
            <a href="https://github.com">Visit My GitHub</a>
        </div>

    </div>

</body>
</html>
